name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 134.195.90.244
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/dashboard-white-label
            git pull origin main
            docker service update --force dashboard-arven_dashboard-white-label
